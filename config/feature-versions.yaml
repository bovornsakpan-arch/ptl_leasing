# Feature Version Registry for PT Leasing
# =========================================
# Registry นี้ใช้ติดตาม version ของแต่ละ feature และ change request
#
# Usage:
#   - BA อัปเดตไฟล์นี้เมื่อมีการ approve feature หรือ CR
#   - ใช้เพื่อ audit trail และ impact analysis
#   - format: MAJOR.MINOR.PATCH (semver)
#     - MAJOR: breaking change หรือ redesign ใหญ่
#     - MINOR: เพิ่ม functionality ใหม่
#     - PATCH: แก้ไขเล็กน้อย, typo, clarification
#
# Schema ของแต่ละ entry:
#   id: F-XXX หรือ CR-XXX
#   type: new_feature | change_request
#   name: ชื่อ feature
#   current_version: "X.Y.Z"
#   status: draft | in_review | approved | final
#   epic: EPIC-XX (optional)
#   related_jira: PTL-XXX
#   history:
#     - version: "X.Y.Z"
#       date: YYYY-MM-DD
#       changed_by: email
#       summary: สรุปการเปลี่ยนแปลง
# =========================================

features: []

