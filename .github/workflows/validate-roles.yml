name: Validate Role Permissions

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-roles:
    name: Check Committer Has Permission to Edit Changed Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Get changed files
        id: changed-files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$CHANGED"

      - name: Validate role permissions
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
          PM_EMAIL: bovornsak.pan@snocko-tech.com
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import sys
          import fnmatch
          import yaml

          pr_author = os.environ.get('PR_AUTHOR', '')
          changed_files_str = os.environ.get('CHANGED_FILES', '')
          pm_email = os.environ.get('PM_EMAIL', 'bovornsak.pan@snocko-tech.com')

          changed_files = [f.strip() for f in changed_files_str.strip().split('\n') if f.strip()]

          if not changed_files:
              print("No changed files found. Skipping role validation.")
              sys.exit(0)

          # Load users config
          with open('config/users.yaml', 'r', encoding='utf-8') as f:
              users_data = yaml.safe_load(f)

          # Load roles config
          with open('config/roles.yaml', 'r', encoding='utf-8') as f:
              roles_data = yaml.safe_load(f)

          # Find user's role by GitHub username
          pr_author_role = None
          pr_author_secondary_roles = []
          pr_author_email = None
          for user in users_data.get('users', []):
              if user.get('github', '').lower() == pr_author.lower():
                  pr_author_role = user.get('role')
                  pr_author_secondary_roles = user.get('secondary_roles', [])
                  pr_author_email = user.get('email')
                  break

          if not pr_author_role:
              print(f"WARNING: GitHub user '{pr_author}' not found in config/users.yaml")
              print("Allowing PR — please add this user to config/users.yaml")
              sys.exit(0)

          all_roles = [pr_author_role] + pr_author_secondary_roles
          print(f"PR Author: {pr_author} (roles: {', '.join(all_roles)} — {pr_author_email})")

          # PM has full access
          if pr_author_role == 'PM':
              print("PM role detected — full access granted.")
              sys.exit(0)

          # Get editable paths for all roles (primary + secondary)
          editable_paths = []
          for r in all_roles:
              role_config = roles_data.get('roles', {}).get(r, {})
              editable_paths.extend(role_config.get('editable_paths', []))
          protected_files = roles_data.get('protected_files', [])
          editable_paths = list(set(editable_paths))  # deduplicate

          def path_matches(filepath, patterns):
              """Check if filepath matches any of the glob patterns."""
              for pattern in patterns:
                  # Convert ** glob to fnmatch compatible
                  if fnmatch.fnmatch(filepath, pattern):
                      return True
                  # Handle **/* patterns
                  if '**' in pattern:
                      base = pattern.replace('**', '*')
                      if fnmatch.fnmatch(filepath, base):
                          return True
                      # Check if file is under the directory
                      dir_pattern = pattern.rstrip('/*').rstrip('/**')
                      if filepath.startswith(dir_pattern + '/') or filepath.startswith(dir_pattern):
                          return True
              return False

          violations = []
          warnings_list = []

          for filepath in changed_files:
              # Check if file is protected
              if any(filepath == pf for pf in protected_files):
                  violations.append(filepath)
                  continue

              # Check if role has permission
              if not path_matches(filepath, editable_paths):
                  violations.append(filepath)

          if violations:
              print(f"\nPERMISSION VIOLATION: {pr_author} (roles: {', '.join(all_roles)}) does not have permission to edit:")
              for v in violations:
                  print(f"  - {v}")
              print(f"\nYou don't have permission. Please contact PM ({pm_email})")
              print("Or ask the PM to make these changes directly.")
              sys.exit(1)
          else:
              print(f"\nAll {len(changed_files)} changed file(s) are within allowed permissions for roles: {', '.join(all_roles)}.")
              print("Role validation PASSED")
          PYTHON_SCRIPT
