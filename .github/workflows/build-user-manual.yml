name: Build and Deploy User Manual

on:
  push:
    branches:
      - main
    paths:
      - 'docs/user-manual/**'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manual:
    name: Build MkDocs User Manual
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DASHBOARD_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs and dependencies
        run: |
          pip install \
            "mkdocs-material<9.6" \
            mkdocs \
            mkdocs-minify-plugin

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Deploy to GitHub Pages
        working-directory: docs/user-manual
        run: mkdocs gh-deploy --force --remote-branch gh-pages

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-manual-site
          path: docs/user-manual/site/
          retention-days: 7
